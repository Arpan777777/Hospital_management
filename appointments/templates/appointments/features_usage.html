<!-- ============================================================
     HOW TO USE CONFIRMATION MODAL
     Add this to doctor_schedule.html and any page with cancel/complete buttons
     Replace your existing cancel/complete links/buttons with these
     ============================================================ -->

<!-- COMPLETE APPOINTMENT BUTTON -->
<button type="button" class="btn btn-sm btn-success"
  onclick="confirmDialog({
    icon: '✅',
    title: 'Complete Appointment',
    message: 'Mark this appointment as completed? This will update the patient record.',
    btnText: 'Yes, Complete',
    btnClass: 'success',
    onConfirm: function() { window.location.href='{% url "complete_appointment" appointment.id %}'; }
  })">
  <i class="bi bi-check-circle"></i> Complete
</button>

<!-- CANCEL APPOINTMENT BUTTON -->
<button type="button" class="btn btn-sm btn-danger"
  onclick="confirmDialog({
    icon: '🗑️',
    title: 'Cancel Appointment',
    message: 'Are you sure you want to cancel this appointment? The slot will be freed for other patients.',
    btnText: 'Yes, Cancel',
    btnClass: 'danger',
    onConfirm: function() { window.location.href='{% url "cancel_appointment" appointment.id %}'; }
  })">
  <i class="bi bi-x-circle"></i> Cancel
</button>


<!-- ============================================================
     HOW TO USE TOAST MANUALLY (call from any page)
     ============================================================ -->
<script>
  // Show a success toast
  showToast('Appointment booked successfully!', 'success');

  // Show an error toast
  showToast('Something went wrong. Please try again.', 'error');

  // Show a warning toast
  showToast('This slot is almost fully booked.', 'warning');

  // Show an info toast
  showToast('Your appointment is tomorrow at 9am.', 'info');
</script>


<!-- ============================================================
     PRINT APPOINTMENT BUTTON
     Add this to my_appointments.html or appointment detail page
     ============================================================ -->
<button onclick="printAppointment()" class="btn btn-outline-secondary btn-sm">
  <i class="bi bi-printer"></i> Print
</button>

<script>
function printAppointment() {
  var printContent = document.getElementById('appointmentCard').innerHTML;
  var win = window.open('', '_blank');
  win.document.write(`
    <html>
    <head>
      <title>Appointment - Hospital System</title>
      <style>
        body { font-family: Arial, sans-serif; padding: 30px; color: #0a1628; }
        h2 { color: #0d9488; }
        .label { font-weight: bold; color: #64748b; font-size: 0.85rem; text-transform: uppercase; }
        .value { font-size: 1rem; margin-bottom: 12px; }
        .header { border-bottom: 2px solid #0d9488; padding-bottom: 10px; margin-bottom: 20px; }
        .footer-note { margin-top: 30px; font-size: 0.8rem; color: #94a3b8; border-top: 1px solid #e2e8f0; padding-top: 10px; }
      </style>
    </head>
    <body>
      <div class="header">
        <h2>🏥 Hospital System — Appointment Confirmation</h2>
      </div>
      ${printContent}
      <div class="footer-note">
        This is an auto-generated appointment confirmation. Please bring this document to your appointment.
        <br>Printed on: ${new Date().toLocaleString()}
      </div>
    </body>
    </html>
  `);
  win.document.close();
  win.print();
}
</script>
