{% extends "appointments/base.html" %}
{% block title %}Doctor Availability Calendar{% endblock %}

{% block content %}
<style>
  .page-label { font-size:0.75rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:#0d9488;margin-bottom:0.3rem; }
  .page-title { font-family:'Playfair Display',serif;font-size:1.75rem;font-weight:600;color:#0a1628;margin:0 0 0.25rem; }
  .cal-card { background:#fff;border:1px solid #e2e8f0;border-radius:16px;padding:1.5rem;box-shadow:0 4px 16px rgba(0,0,0,0.05); }
  .cal-header { display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem; }
  .cal-nav { background:#f8f9fc;border:1px solid #e2e8f0;border-radius:8px;padding:6px 14px;cursor:pointer;font-size:0.875rem;font-weight:600;color:#475569;transition:all 0.2s; }
  .cal-nav:hover { background:#e2e8f0; }
  .cal-month { font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:600;color:#0a1628; }
  .cal-grid { display:grid;grid-template-columns:repeat(7,1fr);gap:4px; }
  .cal-day-header { text-align:center;font-size:0.72rem;font-weight:700;color:#94a3b8;text-transform:uppercase;padding:8px 0; }
  .cal-day { min-height:80px;border-radius:10px;padding:6px;border:1px solid #f1f5f9;position:relative;transition:all 0.2s;cursor:pointer; }
  .cal-day:hover { border-color:#0d9488;background:#f0fdfa; }
  .cal-day.empty { background:#fafafa;border-color:transparent;cursor:default; }
  .cal-day.today { border-color:#0d9488;background:#f0fdfa; }
  .cal-day.today .day-num { background:#0d9488;color:#fff;border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center; }
  .day-num { font-size:0.8rem;font-weight:600;color:#475569;margin-bottom:4px;width:24px;height:24px;display:flex;align-items:center;justify-content:center; }
  .slot-pill { font-size:0.65rem;font-weight:600;padding:2px 6px;border-radius:999px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
  .slot-free { background:#dcfce7;color:#166534; }
  .slot-booked { background:#fee2e2;color:#991b1b; }
  .more-slots { font-size:0.65rem;color:#94a3b8;font-weight:500; }
  .legend { display:flex;gap:16px;align-items:center;font-size:0.8rem;color:#64748b; }
  .legend-dot { width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:4px; }
  .filter-bar { background:#f8f9fc;border:1px solid #e2e8f0;border-radius:10px;padding:1rem;margin-bottom:1.5rem; }
</style>

<div class="mb-4">
  <div class="page-label">Doctor Management</div>
  <h1 class="page-title">Availability Calendar</h1>
  <p style="color:#94a3b8;font-size:0.875rem;margin:0;">View all doctor availability slots by month</p>
</div>

<!-- Filter Bar -->
<div class="filter-bar mb-4">
  <div class="row g-3 align-items-end">
    <div class="col-md-4">
      <label class="form-label" style="font-size:0.78rem;font-weight:700;text-transform:uppercase;color:#64748b;">Filter by Doctor</label>
      <select class="form-select form-select-sm" id="doctorFilter" onchange="filterCalendar()">
        <option value="">All Doctors</option>
        {% for doctor in doctors %}
          <option value="{{ doctor.id }}">{{ doctor.first_name }} {{ doctor.last_name }} — {{ doctor.specialization }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="col-md-3">
      <label class="form-label" style="font-size:0.78rem;font-weight:700;text-transform:uppercase;color:#64748b;">Status</label>
      <select class="form-select form-select-sm" id="statusFilter" onchange="filterCalendar()">
        <option value="">All Slots</option>
        <option value="free">Free Only</option>
        <option value="booked">Booked Only</option>
      </select>
    </div>
    <div class="col-md-3">
      <div class="legend">
        <span><span class="legend-dot" style="background:#22c55e;"></span>Free</span>
        <span><span class="legend-dot" style="background:#ef4444;"></span>Booked</span>
        <span><span class="legend-dot" style="background:#0d9488;"></span>Today</span>
      </div>
    </div>
  </div>
</div>

<div class="cal-card">
  <div class="cal-header">
    <button class="cal-nav" onclick="changeMonth(-1)">← Prev</button>
    <div class="cal-month" id="calMonthLabel"></div>
    <button class="cal-nav" onclick="changeMonth(1)">Next →</button>
  </div>
  <div class="cal-grid" id="calDayHeaders"></div>
  <div class="cal-grid" id="calGrid" style="margin-top:4px;"></div>
</div>

<!-- Slot Detail Modal -->
<div class="confirm-overlay" id="slotModal">
  <div class="confirm-box" style="max-width:500px;max-height:70vh;overflow-y:auto;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
      <div class="confirm-title" id="slotModalDate" style="margin:0;"></div>
      <button onclick="document.getElementById('slotModal').classList.remove('active')" style="background:none;border:none;font-size:1.2rem;cursor:pointer;color:#94a3b8;">✕</button>
    </div>
    <div id="slotModalContent"></div>
  </div>
</div>

<script>
// Pass slots data from Django
var allSlots = [
  {% for slot in slots %}
  {
    id: {{ slot.id }},
    doctor: "{{ slot.doctor.first_name }} {{ slot.doctor.last_name }}",
    specialization: "{{ slot.doctor.specialization }}",
    doctor_id: {{ slot.doctor.id }},
    start: "{{ slot.start_time|date:'Y-m-d H:i' }}",
    end: "{{ slot.end_time|date:'H:i' }}",
    is_booked: {{ slot.is_booked|yesno:"true,false" }}
  }{% if not forloop.last %},{% endif %}
  {% endfor %}
];

var currentDate = new Date();
var currentMonth = currentDate.getMonth();
var currentYear = currentDate.getFullYear();
var activeDoctor = '';
var activeStatus = '';

var DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
var MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

function renderHeaders() {
  var h = document.getElementById('calDayHeaders');
  h.innerHTML = DAYS.map(function(d){ return '<div class="cal-day-header">'+d+'</div>'; }).join('');
}

function renderCalendar() {
  var label = document.getElementById('calMonthLabel');
  label.textContent = MONTHS[currentMonth] + ' ' + currentYear;

  var grid = document.getElementById('calGrid');
  grid.innerHTML = '';

  var firstDay = new Date(currentYear, currentMonth, 1).getDay();
  var daysInMonth = new Date(currentYear, currentMonth+1, 0).getDate();
  var today = new Date();

  // Filter slots
  var filtered = allSlots.filter(function(s) {
    var d = new Date(s.start);
    if (d.getMonth() !== currentMonth || d.getFullYear() !== currentYear) return false;
    if (activeDoctor && s.doctor_id != activeDoctor) return false;
    if (activeStatus === 'free' && s.is_booked) return false;
    if (activeStatus === 'booked' && !s.is_booked) return false;
    return true;
  });

  // Group by date
  var byDate = {};
  filtered.forEach(function(s) {
    var d = new Date(s.start).getDate();
    if (!byDate[d]) byDate[d] = [];
    byDate[d].push(s);
  });

  // Empty cells
  for (var i=0; i<firstDay; i++) {
    var empty = document.createElement('div');
    empty.className = 'cal-day empty';
    grid.appendChild(empty);
  }

  // Day cells
  for (var d=1; d<=daysInMonth; d++) {
    var cell = document.createElement('div');
    var isToday = (d === today.getDate() && currentMonth === today.getMonth() && currentYear === today.getFullYear());
    cell.className = 'cal-day' + (isToday ? ' today' : '');

    var daySlots = byDate[d] || [];
    var dateStr = currentYear+'-'+(currentMonth+1 < 10 ? '0':'')+(currentMonth+1)+'-'+(d < 10 ? '0':'')+d;

    var html = '<div class="day-num">'+d+'</div>';
    var show = daySlots.slice(0, 2);
    show.forEach(function(s) {
      var cls = s.is_booked ? 'slot-booked' : 'slot-free';
      var time = s.start.split(' ')[1];
      html += '<div class="slot-pill '+cls+'">'+time+' '+s.doctor.split(' ')[1]+'</div>';
    });
    if (daySlots.length > 2) {
      html += '<div class="more-slots">+' + (daySlots.length-2) + ' more</div>';
    }
    cell.innerHTML = html;

    if (daySlots.length > 0) {
      (function(slots, date) {
        cell.addEventListener('click', function() { showSlotModal(slots, date); });
      })(daySlots, dateStr);
    }

    grid.appendChild(cell);
  }
}

function showSlotModal(slots, date) {
  document.getElementById('slotModalDate').textContent = '📅 Slots on ' + date;
  var content = '';
  slots.forEach(function(s) {
    var badge = s.is_booked
      ? '<span style="background:#fee2e2;color:#991b1b;padding:2px 8px;border-radius:999px;font-size:0.72rem;font-weight:600;">Booked</span>'
      : '<span style="background:#dcfce7;color:#166534;padding:2px 8px;border-radius:999px;font-size:0.72rem;font-weight:600;">Free</span>';
    content += '<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #f1f5f9;">' +
      '<div><div style="font-weight:600;color:#0a1628;font-size:0.875rem;">Dr. '+s.doctor+'</div>' +
      '<div style="font-size:0.78rem;color:#64748b;">'+s.specialization+' · '+s.start.split(' ')[1]+' – '+s.end+'</div></div>' +
      badge + '</div>';
  });
  document.getElementById('slotModalContent').innerHTML = content;
  document.getElementById('slotModal').classList.add('active');
}

function changeMonth(dir) {
  currentMonth += dir;
  if (currentMonth > 11) { currentMonth = 0; currentYear++; }
  if (currentMonth < 0)  { currentMonth = 11; currentYear--; }
  renderCalendar();
}

function filterCalendar() {
  activeDoctor = document.getElementById('doctorFilter').value;
  activeStatus = document.getElementById('statusFilter').value;
  renderCalendar();
}

renderHeaders();
renderCalendar();
</script>
{% endblock %}
