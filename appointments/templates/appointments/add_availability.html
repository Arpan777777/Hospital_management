{% extends "appointments/base.html" %}
{% block title %}Add Availability Slot{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-7">
    <div class="card shadow-sm border-0 premium-card">
      <div class="card-body p-4 p-md-5">

        <h1 class="h4 mb-4 fw-bold" style="color:#101a3a;">
          <i class="bi bi-calendar-plus text-primary"></i> Add Availability Slot
        </h1>

        <form method="POST" class="row g-3">
          {% csrf_token %}

          <div class="col-12">
            <label class="form-label text-muted fw-semibold">Select Doctor</label>
            <select class="form-select form-select-lg" name="doctor" required>
              <option value="">-- Select Doctor --</option>
              {% for doctor in doctors %}
                <option value="{{ doctor.id }}">Dr. {{ doctor.first_name }} {{ doctor.last_name }} ({{ doctor.specialization }})</option>
              {% endfor %}
            </select>
          </div>

          <div class="col-md-6">
            <label class="form-label text-muted fw-semibold">Start Time</label>
            <input 
              type="datetime-local" 
              class="form-control form-control-lg" 
              name="start_time" 
              required>
          </div>

          <div class="col-md-6">
            <label class="form-label text-muted fw-semibold">End Time</label>
            <input 
              type="datetime-local" 
              class="form-control form-control-lg" 
              name="end_time" 
              required>
          </div>

          <div class="col-12 mt-3 d-flex gap-2">
            <button class="btn btn-primary flex-grow-1 py-2" 
              style="background: linear-gradient(135deg,#2f5bff,#7b2cff); border: none;" 
              type="submit">
              <i class="bi bi-plus-circle"></i> Add Slot
            </button>
            <a class="btn btn-light px-4" href="{% url 'patient_list' %}">Cancel</a>
          </div>
        </form>

      </div>
    </div>
  </div>
</div>
{% endblock %}
